name: RGS CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'rgs/**'
      - '.github/workflows/rgs-ci.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'rgs/**'

jobs:
  lint-and-test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f rgs/api/requirements.txt ]; then pip install -r rgs/api/requirements.txt; fi
          if [ -f rgs/scheduler/requirements.txt ]; then pip install -r rgs/scheduler/requirements.txt; fi
      - name: Lint with flake8
        run: |
          flake8 rgs/api rgs/scheduler --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 rgs/api rgs/scheduler --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test with pytest
        run: |
          # Create placeholder tests if none exist
          mkdir -p rgs/api/tests
          echo "def test_health(): assert True" > rgs/api/tests/test_api.py
          pytest rgs/api/tests

  lint-and-test-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rgs/page/package-lock.json
      - name: Install dependencies
        working-directory: rgs/page
        run: npm ci
      - name: Lint
        working-directory: rgs/page
        run: npm run lint
      - name: Test
        working-directory: rgs/page
        run: npm run test
      - name: Build
        working-directory: rgs/page
        run: npm run build
