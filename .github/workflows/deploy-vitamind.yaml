name: Deploy Vitamind SPA

on:
  push:
    branches:
      - main
    paths:
      - 'vitamind/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-vitamind"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vitamind dependencies
        run: npm install
        working-directory: vitamind

      - name: Build Vitamind SPA
        run: npm run build -- --base=/maps/vitamind/ --outDir ../gh-pages-staging/vitamind
        working-directory: vitamind
        env:
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-staging

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Notify Central Index
        run: |
          curl -X POST --fail \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.INDEX_UPDATE_TOKEN }}" \
            https://api.github.com/repos/tommyroar/tommyroar.github.io/dispatches \
            -d '{"event_type": "update_project"}'
