name: Deploy Vitamind SPA to GitHub Pages

on:
  push:
    branches:
      - main # Or your default branch, e.g., master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Use a recent LTS Node.js version

      - name: Install dependencies
        run: npm install
        working-directory: vitamind

      - name: Build React SPA
        run: npm run build -- --base=/maps/vitamind/
        working-directory: vitamind

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: vitamind/dist # Path to your build output directory

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
