name: Deploy Vitamind SPA to GitHub Pages

on:
  push:
    branches:
      - vitamind

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Use a recent LTS Node.js version

      - name: Install dependencies
        run: npm install
        working-directory: vitamind

      - name: Build React SPA
        run: npm run build -- --base=/maps/vitamind/ # Build with the correct absolute base path
        working-directory: vitamind
        env:
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}

      - name: Prepare Pages Artifact
        run: |
          mkdir gh-pages-staging
          mv vitamind/dist gh-pages-staging/vitamind # Move built SPA into 'vitamind' subdirectory within staging

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-staging # Upload the staging directory

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
