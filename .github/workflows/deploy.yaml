name: Publish MkDocs Site

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Run this workflow to publish the MkDocs site to GitHub Pages.'
        required: true
        type: boolean
        default: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # To allow pushing to gh-pages branch
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material # Install mkdocs and mkdocs-material theme

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site # The directory where mkdocs build puts the site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
