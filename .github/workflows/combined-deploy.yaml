name: Combined App and Docs Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MkDocs dependencies
        run: pip install mkdocs-material

      - name: Build MkDocs
        run: mkdocs build

      - name: Build Vitamind
        working-directory: vitamind
        run: |
          npm ci
          npm run build
          cp -r dist ../site/vitamind

      - name: Build RGS
        working-directory: rgs/page
        run: |
          npm ci
          npm run build
          cp -r dist ../../site/rgs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
